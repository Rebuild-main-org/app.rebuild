# Local observability stack for REBUILD: Prometheus scrapes the app's
# /api/metrics, Grafana renders the AI dashboards (provisioned as code).
#
#   docker compose -f docker-compose.observability.yml up
#   Grafana → http://localhost:3001  (admin / admin)
#   Prometheus → http://localhost:9090
#
# The app is expected on the host at :3000 (next dev/start); Prometheus reaches
# it via host.docker.internal (see observability/prometheus/prometheus.yml).
# Langfuse traces use Langfuse Cloud (see observability/README.md) — not part of
# this compose.
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: rebuild-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: rebuild-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
